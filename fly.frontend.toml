app = 'kinoimblauensalon'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile.frontend'

[deploy]
  strategy = "bluegreen"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
    tls_skip_verify = true

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
